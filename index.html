<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天命創業羅盤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#120A28;--bg2:#150C30;--bg3:#1E1040;--s:#BFC1C2;--s2:#D8DADB;--s3:#9A9C9D;--bdr:rgba(191,193,194,0.18);--bdr2:rgba(191,193,194,0.28)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);min-height:100vh;font-family:'Noto Sans TC',sans-serif;color:var(--s);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(155,111,212,.10) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(229,184,74,.06) 0%,transparent 45%);pointer-events:none;z-index:0}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:rgba(191,193,194,.5);animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:.8;transform:scale(1.2)}}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 16px 60px}
.hdr{text-align:center;padding:32px 0 20px}
.logo{width:60px;height:60px;margin:0 auto 12px;border:1.5px solid var(--s3);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(191,193,194,.07);font-size:26px}
.title-cn{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--s);letter-spacing:4px;margin-bottom:4px}
.title-sub{font-size:11px;color:var(--s3);letter-spacing:2px;text-transform:uppercase}
.step-bar{display:flex;align-items:center;justify-content:center;margin:18px 0 24px}
.sd{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--s3);transition:all .3s;background:var(--bg2)}
.sd.active{border-color:var(--s2);color:var(--s2);background:rgba(191,193,194,.1);box-shadow:0 0 12px rgba(191,193,194,.2)}
.sd.done{border-color:var(--s3);color:var(--s3);background:rgba(191,193,194,.08)}
.sl{width:32px;height:1px;background:var(--bdr)}
.card{background:rgba(21,12,48,.65);border:1px solid var(--bdr);border-radius:16px;padding:24px;margin-bottom:16px;backdrop-filter:blur(8px)}
.ct{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--s);letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.ct::before{content:'';display:block;width:3px;height:16px;background:var(--s3);border-radius:2px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:11px;color:var(--s3);letter-spacing:1px}
.fi{background:rgba(18,10,40,.85);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;color:var(--s);font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;transition:all .2s;width:100%}
.fi:focus{border-color:var(--s2);box-shadow:0 0 0 2px rgba(191,193,194,.12)}
select.fi option{background:#1E1040;color:var(--s)}
.hg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
.hb{background:rgba(18,10,40,.7);border:1px solid var(--bdr);border-radius:8px;padding:8px 4px;color:var(--s3);font-size:11px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Noto Sans TC',sans-serif;line-height:1.4}
.hb:hover{border-color:var(--s2);color:var(--s2)}
.hb.sel{background:rgba(191,193,194,.1);border-color:var(--s2);color:var(--s2);box-shadow:0 0 8px rgba(191,193,194,.15)}
.hi{font-size:16px;display:block;margin-bottom:3px}
.btn-p{width:100%;padding:14px;background:rgba(191,193,194,.12);border:1px solid var(--s3);border-radius:10px;color:var(--s);font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-p:hover{background:rgba(191,193,194,.2);border-color:var(--s2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(191,193,194,.1)}
.btn-o{padding:10px 20px;background:transparent;border:1px solid var(--bdr);border-radius:8px;color:var(--s3);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn-o:hover{border-color:var(--s2);color:var(--s2)}
.bw{width:100%}
.bz-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.bz-p{background:rgba(18,10,40,.9);border:1px solid var(--bdr);border-radius:12px;padding:12px 8px;text-align:center}
.pl{font-size:10px;color:var(--s3);letter-spacing:1px;margin-bottom:8px}
.pc{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;line-height:1.2;color:var(--s)}
.pc.br{color:var(--s3)}
.pe{font-size:10px;margin-top:4px}
.ew{color:#5DCB6B}.ef{color:#FF6B4A}.ee{color:#D4A84B}.em{color:var(--s2)}.ea{color:#5BA4E6}
.eb-rows{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.eb-r{display:flex;align-items:center;gap:10px}
.el{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--s);width:90px;flex-shrink:0;line-height:1.3}
.et{flex:1;height:6px;background:rgba(191,193,194,.08);border-radius:3px;overflow:hidden}
.ef2{height:100%;border-radius:3px;transition:width 1.2s ease}
.ep{font-size:11px;color:var(--s3);width:42px;text-align:right}
.tb{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:10px;background:rgba(191,193,194,.12);border:1px solid var(--bdr2);color:var(--s2);margin-left:4px}
.page{display:none}.page.active{display:block}
.div{height:1px;background:var(--bdr);margin:16px 0}
.ir{display:flex;justify-content:space-between;font-size:13px;color:var(--s3);padding:4px 0}
.iv{color:var(--s);font-weight:500}
.notice{font-size:11px;color:var(--s3);text-align:center;margin-top:12px;line-height:1.6}
.ht-disp{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.ht{padding:5px 12px;border-radius:20px;background:rgba(191,193,194,.1);border:1px solid var(--s3);color:var(--s);font-size:12px}
.cb{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:rgba(191,193,194,.06);border:1px solid var(--bdr);font-size:13px;color:var(--s3);margin:4px}
.cb strong{color:var(--s)}
.err{background:rgba(200,60,60,.1);border:1px solid rgba(200,60,60,.3);border-radius:8px;padding:10px 14px;font-size:12px;color:#FF9090;margin-top:8px;display:none}
.rs{display:flex;flex-direction:column;gap:16px}
.oc{background:rgba(18,10,40,.85);border:1px solid var(--bdr);border-radius:14px;padding:20px;position:relative;overflow:hidden;animation:fu .5s ease both}
.oc::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--s3),transparent)}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.oh{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.oi{font-size:28px;line-height:1;flex-shrink:0}
.ott{font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:var(--s);line-height:1.4;margin-bottom:4px}
.otgs{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.otg{padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(191,193,194,.08);border:1px solid var(--bdr);color:var(--s3)}
.ob{font-size:13px;color:var(--s3);line-height:1.75;margin-bottom:12px}
.ots{display:flex;flex-wrap:wrap;gap:6px}
.tc{padding:4px 10px;border-radius:6px;font-size:11px;background:rgba(191,193,194,.08);border:1px solid var(--bdr);color:var(--s)}
.line-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:#06C755;border-radius:7px;font-size:11px;color:#fff;text-decoration:none;font-family:'Noto Sans TC',sans-serif;font-weight:600;letter-spacing:.5px;white-space:nowrap;flex-shrink:0}
.line-btn:hover{background:#05b34c}
.tip{font-size:11px;color:var(--s3);margin-top:10px;line-height:1.6;padding:8px 12px;background:rgba(191,193,194,.05);border-radius:6px;border-left:2px solid var(--s3)}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <div class="hdr">
    <div class="logo">✦</div>
    <div class="title-cn">天命創業羅盤</div>
    <div class="title-sub">Destiny × AI Business Compass</div>
  </div>
  <div class="step-bar">
    <div class="sd active" id="sd1">1</div><div class="sl"></div>
    <div class="sd" id="sd2">2</div><div class="sl"></div>
    <div class="sd" id="sd3">3</div><div class="sl"></div>
    <div class="sd" id="sd4">✦</div>
  </div>

  <div id="page1" class="page active">
    <div class="card">
      <div class="ct">輸入生辰八字</div>
      <div class="r3" style="margin-bottom:12px">
        <div class="fg"><div class="fl">年</div><input type="number" class="fi" id="year" placeholder="輸入西元年" min="1900" max="2030"></div>
        <div class="fg"><div class="fl">月</div>
          <select class="fi" id="month"><option value="">月</option>
            <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
            <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
            <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
          </select>
        </div>
        <div class="fg"><div class="fl">日</div><input type="number" class="fi" id="day" placeholder="日" min="1" max="31"></div>
      </div>
      <div class="r2">
        <div class="fg"><div class="fl">時辰</div>
          <select class="fi" id="hour">
            <option value="">選擇時辰</option>
            <option value="0">子時 23:00–01:00</option><option value="1">丑時 01:00–03:00</option>
            <option value="2">寅時 03:00–05:00</option><option value="3">卯時 05:00–07:00</option>
            <option value="4">辰時 07:00–09:00</option><option value="5">巳時 09:00–11:00</option>
            <option value="6">午時 11:00–13:00</option><option value="7">未時 13:00–15:00</option>
            <option value="8">申時 15:00–17:00</option><option value="9">酉時 17:00–19:00</option>
            <option value="10">戌時 19:00–21:00</option><option value="11">亥時 21:00–23:00</option>
          </select>
        </div>
        <div class="fg"><div class="fl">性別</div>
          <select class="fi" id="gender"><option value="m">男</option><option value="f">女</option></select>
        </div>
      </div>
      <div class="tip">⚡ 月柱以節氣為準。若出生在節氣交界日（每月4–8日前後），建議對照實際節氣時刻。</div>
      <div class="err" id="err1">請填寫完整出生年月日時</div>
    </div>
    <div class="card">
      <div class="ct">選擇兩個喜好領域</div>
      <div class="hg" id="hg">
        <button class="hb" data-val="科技"><span class="hi">💻</span>科技</button>
        <button class="hb" data-val="教育"><span class="hi">📚</span>教育</button>
        <button class="hb" data-val="健康美容"><span class="hi">✨</span>健康美容</button>
        <button class="hb" data-val="藝術創作"><span class="hi">🎨</span>藝術創作</button>
        <button class="hb" data-val="飲食料理"><span class="hi">🍜</span>飲食料理</button>
        <button class="hb" data-val="旅遊體驗"><span class="hi">✈️</span>旅遊體驗</button>
        <button class="hb" data-val="金融理財"><span class="hi">💰</span>金融理財</button>
        <button class="hb" data-val="人際關係"><span class="hi">🤝</span>人際關係</button>
        <button class="hb" data-val="音樂娛樂"><span class="hi">🎵</span>音樂娛樂</button>
        <button class="hb" data-val="電商零售"><span class="hi">🛍️</span>電商零售</button>
        <button class="hb" data-val="身心靈"><span class="hi">🔮</span>身心靈</button>
        <button class="hb" data-val="遊戲電競"><span class="hi">🎮</span>遊戲電競</button>
      </div>
      <div id="hdisp" class="ht-disp"></div>
    </div>
    <button class="btn-p" onclick="goStep2()">命盤推算 →</button>
    <div class="notice">日柱採用儒略日 (JD+49)%60 精準算法 · 月柱依節氣口訣計算 · 結果採用靜態資料庫即時呈現</div>
  </div>

  <div id="page2" class="page">
    <div id="baziDisp"></div>
    <button class="btn-p" onclick="goStep3()">分析天賦能量 →</button>
    <button class="btn-o bw" onclick="goPage(1)">← 返回修改</button>
  </div>

  <div id="page3" class="page">
    <div id="energyDisp"></div>
    <button class="btn-p" onclick="goStep4()">查看創業機會 →</button>
    <button class="btn-o bw" onclick="goPage(2)">← 返回</button>
  </div>

  <div id="page4" class="page">
    <div id="resultDisp"></div>
  </div>
</div>

function getJD(y,m,d){if(m<=2){y--;m+=12;}const A=Math.floor(y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524;}
function dayP(y,m,d){const jd=getJD(y,m,d),idx=(jd+49)%60;return{si:idx%10,bi:idx%12};}
function yearP(y,m,d){let yr=y;if(m<2||(m===2&&d<4))yr--;return{si:((yr-4)%10+10)%10,bi:((yr-4)%12+12)%12};}
function monthP(ysi,m,d){let adjM=m;if(d<6)adjM--;if(adjM<=0)adjM+=12;const bi=adjM%12;const starts=[2,4,6,8,0];const si=(starts[ysi%5]+(bi-2+12)%12)%10;return{si,bi};}
function hourP(dsi,hb){const starts=[0,2,4,6,8];return{si:(starts[dsi%5]+hb)%10,bi:hb};}

  ps.forEach((p,i)=>{const w=i===2?1.2:1;(HIDDEN[p.bi]||[]).forEach(h=>{ee[STEM_ELEM[h.si]]+=(h.pct/100)*w;});});
  let se={};Object.entries(ssMap).forEach(([n,e])=>{se[n]=ee[e]||0;});
  const tot=Object.values(se).reduce((a,b)=>a+b,0);
  if(tot>0)Object.keys(se).forEach(k=>{se[k]=Math.round(se[k]/tot*100);});
  const sorted=Object.entries(se).sort((a,b)=>b[1]-a[1]),top2=sorted.slice(0,2).map(e=>e[0]);
  CR.top2=top2;CR.dayElem=dayElem;

  const BC={比劫:'rgba(191,193,194,.75)',食傷:'rgba(191,193,194,.58)',財星:'rgba(191,193,194,.62)',官殺:'rgba(191,193,194,.45)',印星:'rgba(191,193,194,.52)'};
  const bars=sorted.map(([n,p])=>{const isT=top2.includes(n);return`<div class="eb-r"><div class="el">${CATS[n].cn}<br><span style="font-size:10px;color:#9A9C9D">${n}</span></div><div class="et"><div class="ef2" style="width:${p}%;background:${isT?'#BFC1C2':BC[n]}"></div></div><div class="ep">${p}%${isT?'<span class="tb">TOP</span>':''}</div></div>`;}).join('');
  const t2=top2.map(n=>`<div class="cb"><strong>${n}</strong> ${CATS[n].cn}</div>`).join('<span style="color:#9A9C9D;padding:4px">×</span>');
  const hh=CR.hobbies.map(h=>`<div class="cb">🎯 <strong>${h}</strong></div>`).join('<span style="color:#9A9C9D;padding:4px">×</span>');
  $('energyDisp').innerHTML=`<div class="card"><div class="ct">五星能量分析</div><div class="eb-rows">${bars}</div></div><div class="card"><div class="ct">天賦 × 喜好 配對組合</div><div style="margin-bottom:8px"><div style="font-size:11px;color:#9A9C9D;margin-bottom:6px">能量最強天賦</div><div style="display:flex;flex-wrap:wrap;align-items:center">${t2}</div></div><div class="div"></div><div><div style="font-size:11px;color:#9A9C9D;margin-bottom:6px">你的興趣喜好</div><div style="display:flex;flex-wrap:wrap;align-items:center">${hh}</div></div></div>`;
  goPage(3);
};

window.goStep4=function(){
  const{top2,hobbies}=CR;
  const c1=CATS[top2[0]],c2=CATS[top2[1]];
  // 4組配對：天賦1×喜好1, 天賦1×喜好2, 天賦2×喜好1, 天賦2×喜好2
  const combos=[
    [hobbies[0],top2[0]],[hobbies[1],top2[0]],
    [hobbies[0],top2[1]],[hobbies[1],top2[1]]
  ];
  let allOpps=[];
  combos.forEach(([h,ss])=>{
    const list=(BAZI_DB[h]&&BAZI_DB[h][ss])||[];
    if(list.length>0)allOpps.push(list[0]);
  });
  // 去重
  const seen=new Set();
  allOpps=allOpps.filter(o=>{const k=o.title;if(seen.has(k))return false;seen.add(k);return true;});

  const hdr=`<div class="card" style="margin-bottom:16px"><div class="ct">你的天命創業地圖</div><div style="font-size:12px;color:#9A9C9D;line-height:1.8">天賦：<strong style="color:#BFC1C2">${top2[0]} ${c1.cn}</strong> + <strong style="color:#BFC1C2">${top2[1]} ${c2.cn}</strong><br>喜好：<strong style="color:#BFC1C2">${hobbies[0]}</strong> + <strong style="color:#BFC1C2">${hobbies[1]}</strong></div></div>`;
  const cards=allOpps.map((o,i)=>`<div class="oc" style="animation-delay:${i*.12}s">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px">
      <div class="oh" style="margin-bottom:0;flex:1">
        <div class="oi">${o.icon}</div>
        <div><div class="ott">${o.title}</div><div class="otgs">${(o.tags||[]).map(t=>`<span class="otg">${t}</span>`).join('')}</div></div>
      </div>
      <a href="https://line.me/ti/p/ZC-w2BuPoi" target="_blank" class="line-btn">💬 聯絡我進一步</a>
    </div>
    <div class="ob">${o.description}</div>
    <div style="font-size:11px;color:#9A9C9D;margin-bottom:8px">推薦AI工具</div>
    <div class="ots">${(o.aiTools||[]).map(t=>`<span class="tc">${t}</span>`).join('')}</div>
    ${o.combo?`<div style="margin-top:10px;font-size:11px;color:#9A9C9D">配對組合：<span style="color:#BFC1C2">${o.combo}</span></div>`:''}
  </div>`).join('');
  $('resultDisp').innerHTML=`<div class="rs">${hdr}${cards}<button class="btn-o bw" onclick="goPage(1)">← 重新推算</button></div>`;
  goPage(4);
};
})();
</script>
